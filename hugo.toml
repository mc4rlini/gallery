baseURL = "https://gallery.carlini.me/"
title = "Gallery"
theme = "github.com/nicokaiser/hugo-theme-gallery/v4"

# Require Hugo Extended
[module]
  [module.hugoVersion]
    extended = true
    min = "0.123.0"
  [[module.imports]]
    path = "github.com/nicokaiser/hugo-theme-gallery/v4"

[params]
  title = "Gallery"
  description = "Photo Gallery"
  author = "Manuele Carlini"
  # Dark theme: "auto", "dark", "light"
  colorScheme = "auto"
  # Number of columns in album grid (default: 3)
  # albumColumns = 3

[imaging]
  # Default quality for resized images
  quality = 85

[imaging.exif]
  includeFields = ".*"
